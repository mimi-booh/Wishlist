<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mimi 🐱 ♡ Booh 🌻 — Our Wishlists</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#FDF8F3;font-family:'DM Sans',system-ui,sans-serif;min-height:100vh}
.app{min-height:100vh;background:#FDF8F3;padding-bottom:60px}

/* ── Header ── */
.hdr{
  text-align:center;padding:40px 24px 30px;
  background:linear-gradient(155deg,#FFF6EE 0%,#FDEEE3 100%);
  border-bottom:1px solid #F2E0D4;margin-bottom:24px;
  position:relative;overflow:hidden;
}
.hdr::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 75% 50%,rgba(212,100,100,.07) 0%,transparent 70%);
  pointer-events:none;
}
.title{
  font-family:'Playfair Display',Georgia,serif;
  font-size:clamp(1.9rem,5vw,2.6rem);
  color:#2D1B0E;letter-spacing:-.02em;line-height:1.2;position:relative;
}
.heart{color:#D4145A;display:inline-block;animation:hb 2.4s ease-in-out infinite}
@keyframes hb{0%,100%{transform:scale(1)}30%{transform:scale(1.28)}60%{transform:scale(1.1)}}
.sub{
  font-family:'Playfair Display',serif;font-style:italic;
  color:#9C7B6A;font-size:.95rem;margin-top:6px;letter-spacing:.025em;position:relative;
}
.sync-dot{
  display:inline-block;width:7px;height:7px;border-radius:50%;
  background:#C4A897;margin-left:8px;vertical-align:middle;transition:background .4s;
}
.sync-dot.live{background:#4CAF50;box-shadow:0 0 6px rgba(76,175,80,.5)}

/* ── Grid ── */
.grid{
  max-width:1020px;margin:0 auto;padding:0 18px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:16px;align-items:start;
}

/* ── Card ── */
.card{
  background:#fff;border-radius:14px;
  box-shadow:0 2px 12px rgba(45,27,14,.07),0 0 0 1px rgba(45,27,14,.04);
  border-top:4px solid var(--accent);
  transition:box-shadow .22s,transform .22s;overflow:hidden;
}
.card:hover{box-shadow:0 7px 26px rgba(45,27,14,.13),0 0 0 1px rgba(45,27,14,.06);transform:translateY(-2px)}
.card.open{box-shadow:0 8px 32px rgba(45,27,14,.15),0 0 0 1px rgba(45,27,14,.08)}
.card-hdr{
  padding:16px 18px;display:flex;justify-content:space-between;align-items:center;
  cursor:pointer;user-select:none;background:var(--bg);gap:8px;
}
.card-left{display:flex;align-items:center;gap:10px;min-width:0}
.cat-icon{font-size:1.35rem;flex-shrink:0}
.cat-name{
  font-family:'Playfair Display',serif;font-weight:700;font-size:.95rem;color:#2D1B0E;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.card-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.badge{
  background:var(--accent);color:#fff;border-radius:12px;
  padding:2px 9px;font-size:.7rem;font-weight:600;letter-spacing:.03em;
}
.chev{color:var(--accent);font-size:.65rem;opacity:.65;transition:transform .2s}
.card.open .chev{transform:rotate(180deg)}
.card-body{
  padding:14px 18px 18px;border-top:1px solid rgba(45,27,14,.07);
  animation:fadeIn .18s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

/* ── Items ── */
.items{margin-bottom:14px}
.empty{text-align:center;color:#C4A897;font-size:.82rem;font-style:italic;padding:12px 0}

.item-wrap{border-bottom:1px dashed rgba(45,27,14,.08)}
.item-wrap:last-child{border-bottom:none}

.item{
  display:flex;align-items:center;gap:8px;
  padding:7px 0;transition:opacity .2s;
}
.item.done{opacity:.45}
.item.done .item-txt{text-decoration:line-through;color:#B0947A}

.check-btn{
  width:24px;height:24px;border:2px solid var(--accent);border-radius:50%;
  background:none;color:var(--accent);font-size:.7rem;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:background .14s,color .14s;line-height:1;
}
.item.done .check-btn{background:var(--accent);color:#fff}

.item-txt{flex:1;font-size:.875rem;color:#2D1B0E;line-height:1.4;min-width:0;word-break:break-word}
.item-by{font-size:.85rem;flex-shrink:0}

.comment-toggle{
  background:none;border:none;cursor:pointer;padding:2px 4px;
  font-size:.75rem;color:#C4A897;transition:color .14s;flex-shrink:0;
  display:flex;align-items:center;gap:3px;line-height:1;
}
.comment-toggle:hover{color:var(--accent)}
.comment-toggle.has-comments{color:var(--accent);opacity:.8}
.comment-count{font-size:.68rem;font-weight:600}

.del-btn{
  background:none;border:none;color:#D4BFB5;cursor:pointer;
  font-size:1.1rem;line-height:1;padding:2px 4px;transition:color .14s;flex-shrink:0;
}
.del-btn:hover{color:#D4145A}

/* ── Comments panel ── */
.comments-panel{
  margin:0 0 8px 32px;
  border-left:2px solid var(--accent);
  padding-left:10px;
  animation:fadeIn .15s ease;
  opacity:.9;
}
.comment-item{
  display:flex;align-items:flex-start;gap:6px;
  padding:4px 0;
}
.comment-avatar{font-size:.85rem;flex-shrink:0;margin-top:1px}
.comment-bubble{
  background:var(--bg);border-radius:0 8px 8px 8px;
  padding:5px 9px;flex:1;min-width:0;
}
.comment-text{font-size:.8rem;color:#2D1B0E;line-height:1.4;word-break:break-word}
.comment-meta{font-size:.68rem;color:#C4A897;margin-top:2px}
.comment-del{
  background:none;border:none;color:#DDD;cursor:pointer;
  font-size:.9rem;padding:2px;flex-shrink:0;margin-top:2px;
  transition:color .14s;line-height:1;
}
.comment-del:hover{color:#D4145A}

.comment-input-row{
  display:flex;gap:6px;margin-top:6px;
}
.comment-input{
  flex:1;border:1.5px solid rgba(45,27,14,.1);border-radius:7px;
  padding:6px 9px;font-family:'DM Sans',sans-serif;font-size:.8rem;
  color:#2D1B0E;background:#fff;outline:none;transition:border-color .14s;
}
.comment-input:focus{border-color:var(--accent)}
.comment-input::placeholder{color:#C4A897;font-style:italic}
.comment-send{
  width:30px;height:30px;border:none;border-radius:7px;
  background:var(--accent);color:#fff;font-size:.9rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:opacity .13s;flex-shrink:0;
}
.comment-send:hover{opacity:.8}

/* ── Add form ── */
.add-form{background:var(--bg);border-radius:10px;padding:12px}
.by-row{display:flex;gap:7px;margin-bottom:9px}
.by-btn{
  flex:1;padding:6px 0;border:1.5px solid var(--accent);border-radius:7px;
  background:transparent;color:var(--accent);cursor:pointer;font-size:.78rem;
  font-weight:500;opacity:.5;transition:all .13s;font-family:'DM Sans',sans-serif;
}
.by-btn.active{background:var(--accent);color:#fff;opacity:1}
.inp-row{display:flex;gap:7px}
.add-input{
  flex:1;border:1.5px solid rgba(45,27,14,.12);border-radius:7px;
  padding:8px 11px;font-family:'DM Sans',sans-serif;font-size:.865rem;
  color:#2D1B0E;background:#fff;outline:none;transition:border-color .14s;
}
.add-input:focus{border-color:var(--accent)}
.add-input::placeholder{color:#C4A897;font-style:italic}
.add-btn{
  width:36px;height:36px;border:none;border-radius:7px;
  background:var(--accent);color:#fff;font-size:1.35rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:opacity .13s,transform .09s;flex-shrink:0;line-height:1;
}
.add-btn:hover{opacity:.85}
.add-btn:active{transform:scale(.9)}

.footer{
  text-align:center;padding:32px;color:#C4A897;
  font-size:.8rem;font-style:italic;font-family:'Playfair Display',serif;
}
</style>
</head>
<body>
<div id="root">
  <div style="display:flex;align-items:center;justify-content:center;height:80vh;font-family:Georgia;color:#9C7B6A;font-style:italic;">
    Loading your universe of wishes... 🌻
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, arrayUnion, arrayRemove }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── Firebase ─────────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyBjYZdEHcXq39eZlpBdPu6Jx8pN4pQaE6k",
  authDomain: "mimi-booh-wishlist.firebaseapp.com",
  projectId: "mimi-booh-wishlist",
  storageBucket: "mimi-booh-wishlist.firebasestorage.app",
  messagingSenderId: "179817074834",
  appId: "1:179817074834:web:e0dd5dc41e736082da964b"
};
const fireApp = initializeApp(firebaseConfig);
const db      = getFirestore(fireApp);

// ── Categories ───────────────────────────────────────────────────────────────
const CATS = [
  {id:'movies',  icon:'🎬', title:'Movies & Shows',          accent:'#7B2D8B', bg:'#F3E5F5'},
  {id:'travel',  icon:'✈️', title:'Travel Wishlist',          accent:'#1565C0', bg:'#E3F2FD'},
  {id:'dates',   icon:'🕯️', title:'Date Ideas',              accent:'#C2185B', bg:'#FCE4EC'},
  {id:'fantasy', icon:'🔥', title:'Wild Fantasies',           accent:'#BF360C', bg:'#FBE9E7'},
  {id:'music',   icon:'🎵', title:'Books, Shows & Music',     accent:'#00695C', bg:'#E0F2F1'},
  {id:'learn',   icon:'🌱', title:'Learn Together',           accent:'#558B2F', bg:'#F1F8E9'},
  {id:'gifts',   icon:'🎁', title:'Gifts for Each Other',     accent:'#AD1457', bg:'#FCE4EC'},
  {id:'goals',   icon:'⭐', title:'Life Goals & Bucket List',  accent:'#E65100', bg:'#FFF3E0'},
  {id:'food',    icon:'🍽️', title:'Restaurants to Try',      accent:'#4E342E', bg:'#EFEBE9'},
  {id:'misc',    icon:'✨', title:'Miscellaneous & Others',   accent:'#546E7A', bg:'#ECEFF1'},
];

// ── State ────────────────────────────────────────────────────────────────────
let items        = {};
let expanded     = null;
let addBy        = {};
let commentsOpen = {}; // itemId → true/false
let commentBy    = {}; // catId  → 'mimi'|'booh'
let isLive       = false;

CATS.forEach(c => { items[c.id] = []; addBy[c.id] = 'mimi'; commentBy[c.id] = 'mimi'; });

// ── Firestore listener ───────────────────────────────────────────────────────
const colRef = collection(db, "wishlist");

onSnapshot(colRef, snapshot => {
  isLive = true;
  items  = {};
  CATS.forEach(c => items[c.id] = []);

  snapshot.forEach(docSnap => {
    const d = docSnap.data();
    if (!items[d.cat]) items[d.cat] = [];
    items[d.cat].push({
      id:       docSnap.id,
      text:     d.text,
      by:       d.by,
      done:     d.done,
      comments: d.comments || []
    });
  });

  render();
});

// ── Helpers ──────────────────────────────────────────────────────────────────
function esc(s){
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(ts){
  if (!ts) return '';
  const diff = Date.now() - ts;
  const m = Math.floor(diff/60000);
  if (m < 1)  return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m/60);
  if (h < 24) return `${h}h ago`;
  return `${Math.floor(h/24)}d ago`;
}

// ── Actions ──────────────────────────────────────────────────────────────────
async function doAdd(catId, val){
  const txt = (val||'').trim();
  if (!txt) return;
  await addDoc(colRef, {
    cat: catId, text: txt,
    by: addBy[catId] || 'mimi',
    done: false, comments: [], created: Date.now()
  });
}

async function doAddComment(itemId, catId, val){
  const txt = (val||'').trim();
  if (!txt) return;
  const newComment = {
    id:      `c_${Date.now()}_${Math.random().toString(36).slice(2,6)}`,
    text:    txt,
    by:      commentBy[catId] || 'mimi',
    created: Date.now()
  };
  await updateDoc(doc(db, "wishlist", itemId), { comments: arrayUnion(newComment) });
}

async function doDeleteComment(itemId, comment){
  await updateDoc(doc(db, "wishlist", itemId), { comments: arrayRemove(comment) });
}

// ── Render ───────────────────────────────────────────────────────────────────
function render(){
  const root = document.getElementById('root');
  root.innerHTML = `
    <div class="app">
      <div class="hdr">
        <h1 class="title">Mimi 🐱 <span class="heart">♡</span> Booh 🌻<span class="sync-dot${isLive?' live':''}"></span></h1>
        <p class="sub">Our Little Universe of Wishes</p>
      </div>
      <div class="grid">${CATS.map(renderCard).join('')}</div>
      <div class="footer">made with ♡ — just for the two of you</div>
    </div>
  `;

  // Card toggle
  root.querySelectorAll('.card-hdr').forEach(el => {
    el.onclick = () => {
      expanded = expanded === el.dataset.cat ? null : el.dataset.cat;
      render();
    };
  });

  // Check/uncheck
  root.querySelectorAll('.check-btn').forEach(el => {
    el.onclick = async e => {
      e.stopPropagation();
      const { cat, item } = el.dataset;
      const cur = (items[cat]||[]).find(i => i.id === item);
      if (cur) await updateDoc(doc(db,"wishlist",item),{done:!cur.done});
    };
  });

  // Delete wish
  root.querySelectorAll('.del-btn').forEach(el => {
    el.onclick = async e => {
      e.stopPropagation();
      await deleteDoc(doc(db,"wishlist",el.dataset.item));
    };
  });

  // Toggle comments panel
  root.querySelectorAll('.comment-toggle').forEach(el => {
    el.onclick = e => {
      e.stopPropagation();
      const id = el.dataset.item;
      commentsOpen[id] = !commentsOpen[id];
      render();
    };
  });

  // Comment send on Enter
  root.querySelectorAll('.comment-input').forEach(el => {
    el.onkeydown = e => {
      if (e.key === 'Enter') {
        e.stopPropagation();
        doAddComment(el.dataset.item, el.dataset.cat, el.value);
        el.value = '';
      }
    };
  });

  // Comment send on button
  root.querySelectorAll('.comment-send').forEach(el => {
    el.onclick = e => {
      e.stopPropagation();
      const inp = root.querySelector(`.comment-input[data-item="${el.dataset.item}"]`);
      if (inp) { doAddComment(el.dataset.item, el.dataset.cat, inp.value); inp.value=''; inp.focus(); }
    };
  });

  // Delete a comment
  root.querySelectorAll('.comment-del').forEach(el => {
    el.onclick = async e => {
      e.stopPropagation();
      const { item, cat, cid } = el.dataset;
      const wish = (items[cat]||[]).find(i => i.id === item);
      if (!wish) return;
      const comment = wish.comments.find(c => c.id === cid);
      if (comment) await doDeleteComment(item, comment);
    };
  });

  // Switch who's adding a wish
  root.querySelectorAll('.by-btn').forEach(el => {
    el.onclick = e => {
      e.stopPropagation();
      addBy[el.dataset.cat] = el.dataset.by;
      render();
    };
  });

  // Switch who's commenting
  root.querySelectorAll('.cby-btn').forEach(el => {
    el.onclick = e => {
      e.stopPropagation();
      commentBy[el.dataset.cat] = el.dataset.by;
      render();
    };
  });

  // Add wish on Enter/button
  root.querySelectorAll('.add-input').forEach(el => {
    el.onkeydown = e => {
      if (e.key === 'Enter') { e.stopPropagation(); doAdd(el.dataset.cat, el.value); el.value=''; }
    };
  });
  root.querySelectorAll('.add-btn').forEach(el => {
    el.onclick = e => {
      e.stopPropagation();
      const inp = root.querySelector(`.add-input[data-cat="${el.dataset.cat}"]`);
      if (inp) { doAdd(el.dataset.cat, inp.value); inp.value=''; inp.focus(); }
    };
  });
}

// ── Card templates ───────────────────────────────────────────────────────────
function renderCard(cat){
  const list  = items[cat.id] || [];
  const done  = list.filter(i => i.done).length;
  const isExp = expanded === cat.id;

  return `
  <div class="card${isExp?' open':''}" style="--accent:${cat.accent};--bg:${cat.bg}">
    <div class="card-hdr" data-cat="${cat.id}">
      <div class="card-left">
        <span class="cat-icon">${cat.icon}</span>
        <span class="cat-name">${cat.title}</span>
      </div>
      <div class="card-right">
        ${list.length ? `<span class="badge">${done}/${list.length}</span>` : ''}
        <span class="chev">▼</span>
      </div>
    </div>
    ${isExp ? renderBody(cat, list) : ''}
  </div>`;
}

function renderBody(cat, list){
  const by  = addBy[cat.id]  || 'mimi';
  const cby = commentBy[cat.id] || 'mimi';

  return `
  <div class="card-body">
    <div class="items">
      ${list.length === 0
        ? '<p class="empty">Nothing here yet — add your first wish! ✨</p>'
        : list.map(item => renderItem(cat, item, cby)).join('')
      }
    </div>
    <div class="add-form">
      <div class="by-row">
        <button class="by-btn${by==='mimi'?' active':''}" data-cat="${cat.id}" data-by="mimi">🐱 Mimi</button>
        <button class="by-btn${by==='booh'?' active':''}" data-cat="${cat.id}" data-by="booh">🌻 Booh</button>
      </div>
      <div class="inp-row">
        <input class="add-input" data-cat="${cat.id}" placeholder="Add a wish…" type="text" autocomplete="off">
        <button class="add-btn" data-cat="${cat.id}">+</button>
      </div>
    </div>
  </div>`;
}

function renderItem(cat, item, cby){
  const hasComments  = item.comments && item.comments.length > 0;
  const showComments = commentsOpen[item.id];

  return `
  <div class="item-wrap">
    <div class="item${item.done?' done':''}">
      <button class="check-btn" data-cat="${cat.id}" data-item="${item.id}">${item.done?'✓':'○'}</button>
      <span class="item-txt">${esc(item.text)}</span>
      <span class="item-by">${item.by==='mimi'?'🐱':'🌻'}</span>
      <button class="comment-toggle${hasComments?' has-comments':''}" data-item="${item.id}" title="Comments">
        💬<span class="comment-count">${hasComments?item.comments.length:''}</span>
      </button>
      <button class="del-btn" data-item="${item.id}">×</button>
    </div>
    ${showComments ? renderCommentsPanel(cat, item, cby) : ''}
  </div>`;
}

function renderCommentsPanel(cat, item, cby){
  const comments = item.comments || [];

  return `
  <div class="comments-panel" style="--accent:${cat.accent};--bg:${cat.bg}">
    ${comments.length === 0
      ? `<p style="font-size:.78rem;color:#C4A897;font-style:italic;padding:4px 0">No comments yet…</p>`
      : comments.map(c => `
        <div class="comment-item">
          <span class="comment-avatar">${c.by==='mimi'?'🐱':'🌻'}</span>
          <div class="comment-bubble">
            <div class="comment-text">${esc(c.text)}</div>
            <div class="comment-meta">${timeAgo(c.created)}</div>
          </div>
          <button class="comment-del" data-item="${item.id}" data-cat="${cat.id}" data-cid="${c.id}" title="Delete">×</button>
        </div>
      `).join('')
    }
    <div class="comment-input-row">
      <div style="display:flex;gap:5px;margin-bottom:5px;width:100%">
        <button class="cby-btn by-btn${cby==='mimi'?' active':''}" data-cat="${cat.id}" data-by="mimi" style="padding:3px 0;font-size:.72rem">🐱</button>
        <button class="cby-btn by-btn${cby==='booh'?' active':''}" data-cat="${cat.id}" data-by="booh" style="padding:3px 0;font-size:.72rem">🌻</button>
      </div>
    </div>
    <div class="comment-input-row">
      <input class="comment-input" data-item="${item.id}" data-cat="${cat.id}" placeholder="Write a comment…" type="text" autocomplete="off">
      <button class="comment-send" data-item="${item.id}" data-cat="${cat.id}">➤</button>
    </div>
  </div>`;
}

render();
</script>
</body>
</html>
